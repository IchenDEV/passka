name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show Rust version
        run: rustc --version && cargo --version

      - name: Test Rust workspace
        run: cargo test --workspace

  swift:
    name: Swift app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build macOS app
        run: swift build --package-path app

  release-artifacts:
    name: Release artifacts
    runs-on: macos-latest
    needs:
      - rust
      - swift
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust release binaries
        run: cargo build --workspace --release

      - name: Build Swift release app
        run: swift build --package-path app -c release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: passka-macos-${{ github.ref_name }}
          path: |
            target/release/passka
            app/.build/release/PasskaApp
          if-no-files-found: error
